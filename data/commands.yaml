# Словарь команд PaPaPhone.
# Формы одного слова допустимы, синонимы — нет.
# Порядок важен: первый матч побеждает.

- action: emergency
  phrases:
    - спасите
    - скорая
    - скорую
    - мне плохо
    - нужна помощь
    - помогите
    - вызови помощь

- action: call_number
  phrases:
    - набери номер
    - набрать номер
  slot: number

- action: call_contact
  phrases:
    - позвони
    - позвонить
  slot: contact_name

- action: find_contact
  phrases:
    - найди контакт
    - найти контакт
  slot: contact_name

- action: hangup
  phrases:
    - положи трубку
    - положить трубку

- action: answer
  phrases:
    - ответь
    - ответить

- action: read_unread_sms
  phrases:
    - новые сообщения

- action: read_sms
  phrases:
    - сообщения

- action: what_time
  phrases:
    - который час
    - сколько времени

- action: add_contact
  phrases:
    - добавь контакт
    - добавить контакт

- action: alias_contact
  phrases:
    - прозвище
  slot: contact_name

- action: list_contacts
  phrases:
    - список контактов

- action: help
  phrases:
    - команды

- action: address
  phrases:
    - адрес

- action: secret_menu
  phrases:
    - секретное меню
