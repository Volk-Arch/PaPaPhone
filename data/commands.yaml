# Словарь команд голосового телефона.
# phrases — варианты фраз для распознавания (нижний регистр для сопоставления).
# action — тип действия, params — опциональные параметры (slot: имя/номер из ASR или контактов).

- action: call_contact
  phrases:
    - позвони
    - позвони контакт
    - набери
    - позвони по контакту
  slot: contact_name
  description: "Позвонить контакту по имени (имя из фразы или слот)"

- action: call_number
  phrases:
    - набери номер
    - позвони по номеру
    - набрать номер
  slot: number
  description: "Позвонить по указанному номеру"

- action: hangup
  phrases:
    - положи трубку
    - завершить звонок
    - сбрось
    - отбой

- action: answer
  phrases:
    - ответь
    - принять звонок
    - поднять трубку

- action: read_sms
  phrases:
    - прочитай смс
    - прочитай сообщения
    - есть новые смс
    - показать смс

- action: list_contacts
  phrases:
    - список контактов
    - контакты
    - покажи контакты
    - кто у меня в контактах

- action: what_time
  phrases:
    - который час
    - сколько время
    - текущее время
    - время

- action: help
  phrases:
    - помощь
    - что ты умеешь
    - подсказка
    - команды

- action: signal
  phrases:
    - уровень сигнала
    - качество связи
    - сигнал
